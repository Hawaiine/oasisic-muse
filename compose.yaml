services:
  oasisic-muse:
    build: .
    image: barryallen26/oasisic-muse:latest
    container_name: oasisic-muse
    restart: unless-stopped
    ports:
      - "${PORT:-8000}:8000"
    volumes:
      - ./data:/data
    environment:
      - OASISIC_DATA=/data
      - TZ=Asia/Shanghai
      # --- 以下按需配置 ---
      # qBittorrent
      - QB_HOST=${QB_HOST:-}
      - QB_PORT=${QB_PORT:-8080}
      - QB_USERNAME=${QB_USERNAME:-}
      - QB_PASSWORD=${QB_PASSWORD:-}
      # Telegram 通知
      - TG_BOT_TOKEN=${TG_BOT_TOKEN:-}
      - TG_CHAT_ID=${TG_CHAT_ID:-}
      # Discord 通知
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL:-}
      # EMBY 媒体库
      - EMBY_HOST=${EMBY_HOST:-}
      - EMBY_API_KEY=${EMBY_API_KEY:-}
      # 代理
      - PROXY_URL=${PROXY_URL:-}